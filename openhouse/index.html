<style>

  .divider-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }

  /* ── Form wrapper ── */
  .form-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 2px;
    width: 100%;
    max-width: 620px;
    box-shadow: 0 4px 40px rgba(30,28,26,0.08), 0 1px 4px rgba(30,28,26,0.04);

  .form-card-label {

    color: var(--gold);
  }

  /* ── Jotform iframe ── */
  .jotform-wrap {
    width: 100%;
    padding: 0 0 8px;
  }

  .jotform-wrap iframe {
    width: 100%;
    min-height: 700px;
    border: none;
    display: block;
  }

  .page-footer {
    margin-top: 36px;

    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-top: 5px;
  }

  .page-footer .agent-details a {
    color: var(--gold);
    text-decoration: none;
  }

  .page-footer .agent-details a:hover { text-decoration: underline; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    body { padding: 32px 16px 48px; }
    .form-card-header { padding: 22px 20px 0; }
